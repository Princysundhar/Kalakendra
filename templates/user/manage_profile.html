



{% extends 'user/new_user_index.html' %}
{% block body %}



<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Manage Profile</title>
<style>
    .profile-form {
        max-width: 600px;
        margin: 20px auto;
        padding: 25px;
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }
    .form-table {
        width: 100%;
        border-collapse: collapse;
    }
    .form-table th, .form-table td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #e0e0e0;
    }
    .form-table th {
        background-color: #3498db;
        color: white;
        width: 30%;
    }
    .form-table tr:nth-child(even) {
        background-color: #f8f9fa;
    }
    .form-table tr:hover {
        background-color: #f1f9ff;
    }
    input[type="text"], input[type="file"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }
    input[type="submit"] {
        background-color: #2980b9;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s;
    }
    input[type="submit"]:hover {
        background-color: #3498db;
    }
    .img-preview {
        display: block;
        margin-bottom: 10px;
        border-radius: 4px;
        border: 1px solid #ddd;
    }
    .form-title {
        color: #2980b9;
        text-align: center;
        margin-bottom: 20px;
        font-size: 24px;
    }
</style>
</head>

<body>
<div class="profile-form">
    <h2 class="form-title">Manage Profile</h2>
    <form action="/manage_profile_post" method="post" enctype="multipart/form-data" name="form1" id="form1">
      <table class="form-table">
        <tr>
          <th scope="row">Name</th>
          <td><input type="text" name="textfield" id="textfield" value="{{ res3.name }}" /></td>
        </tr>
        <tr>
          <th scope="row">Email</th>
          <td><input type="text" name="textfield2" id="textfield2" value="{{ res3.email }}" /></td>
        </tr>
        <tr>
          <th scope="row">Contact</th>
          <td><input type="text" name="textfield3" id="textfield3" value="{{ res3.contact }}" /></td>
        </tr>
        <tr>
          <th scope="row">Image</th>
          <td>
              <img src="{{ res3.image }}" class="img-preview" width="100px" height="100px" alt=""/>
              <input type="file" name="fileField" id="fileField" />
          </td>
        </tr>
        <tr>
          <th scope="row">Place</th>
          <td><input type="text" name="textfield4" id="textfield4" value="{{ res3.place }}"/></td>
        </tr>
        <tr>
          <th scope="row">Landmark</th>
          <td><input type="text" name="textfield5" id="textfield5" value="{{ res3.landmark }}" /></td>
        </tr>
        <tr>
          <th colspan="2" scope="row" style="text-align: center;">
              <input type="submit" name="button" id="button" value="Update Profile" />
          </th>
        </tr>
      </table>
    </form>
</div>
</body>
</html>

{% endblock %}
