{% extends 'user/new_user_index.html' %}
{% block body %}

<style>
    :root {
        --primary-color: rgba(30, 144, 255, 0.9); /* DodgerBlue with opacity */
        --secondary-color: #1e3a8a; /* Dark blue for buttons */
        --text-color: white;
        --border-color: #000000;
        --light-gray: rgba(0, 0, 0, 0.1);
        --input-bg: rgba(255, 255, 255, 0.15);
        --shadow-sm: 0 2px 5px rgba(0,0,0,0.2);
        --shadow-md: 0 5px 15px rgba(0,0,0,0.3);
        --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    body {
        background: linear-gradient(135deg, #0a0a1f, #1e3a8a);
        padding: 20px;
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
    }

    .feedback-container {
        max-width: 600px;
        margin: 2rem auto;
        background: var(--primary-color);
        border-radius: 15px;
        box-shadow: var(--shadow-md);
        padding: 40px;
        color: var(--text-color);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: var(--transition);
    }

    .feedback-container:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }

    .feedback-header {
        text-align: center;
        margin-bottom: 40px;
        position: relative;
    }

    .feedback-header:after {
        content: '';
        display: block;
        width: 80px;
        height: 3px;
        background: white;
        margin: 15px auto 0;
        opacity: 0.7;
    }

    .feedback-title {
        font-weight: 700;
        font-size: 2rem;
        color: white;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    .feedback-subtitle {
        font-size: 1rem;
        opacity: 0.8;
        margin-top: 0;
    }

    .feedback-form {
        width: 100%;
    }

    .form-row {
        margin-bottom: 30px;
        position: relative;
    }

    .form-row label {
        display: block;
        margin-bottom: 12px;
        font-weight: 500;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
    }

    .form-control {
        width: 100%;
        padding: 15px 20px;
        background: var(--input-bg);
        border: 2px solid var(--border-color);
        border-radius: 10px;
        color: white;
        font-size: 16px;
        transition: var(--transition);
        font-family: 'Poppins', sans-serif;
    }

    textarea.form-control {
        min-height: 180px;
        resize: vertical;
    }

    .form-control:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.25);
        border-color: white;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
    }

    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    .btn-submit {
        background-color: var(--secondary-color);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1.1rem;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
        margin-top: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        box-shadow: var(--shadow-sm);
    }

    .btn-submit:hover {
        background-color: #0a0a1f;
        transform: translateY(-3px);
        box-shadow: var(--shadow-md);
    }

    .btn-submit:active {
        transform: translateY(1px);
    }

    .form-footer {
        text-align: center;
        margin-top: 30px;
        font-size: 0.9rem;
        opacity: 0.8;
    }

    @media (max-width: 768px) {
        .feedback-container {
            padding: 30px 20px;
            margin: 1rem;
        }

        .feedback-title {
            font-size: 1.6rem;
        }

        .btn-submit {
            padding: 12px 20px;
            font-size: 1rem;
        }
    }

    @media (max-width: 480px) {
        .feedback-container {
            border-radius: 10px;
        }

        .form-row {
            margin-bottom: 20px;
        }

        .form-control {
            padding: 12px 15px;
        }
    }
</style>

<div class="feedback-container">
    <div class="feedback-header">
        <h2 class="feedback-title">Share Your Feedback</h2>
        <p class="feedback-subtitle">We value your thoughts and suggestions</p>
    </div>

    <form id="form1" name="form1" method="post" action="/user_send_feedback_post" class="feedback-form">
        {% csrf_token %}

        <div class="form-row">
            <label for="textarea">Your Feedback</label>
            <textarea name="textarea" id="textarea" class="form-control" required
                      placeholder="Tell us what you think about our service..."></textarea>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-paper-plane"></i> Submit Feedback
        </button>

        <div class="form-footer">
            Your feedback helps us improve our services
        </div>
    </form>
</div>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

{% endblock %}
