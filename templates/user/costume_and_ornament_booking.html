

{% extends 'user/new_user_index.html' %}
{% block body %}

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Book Ornament</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .booking-container {
      max-width: 800px;
      margin: 30px auto;
      padding: 30px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    .booking-header {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
    }
    .booking-header h2 {
      font-weight: 600;
      margin-bottom: 10px;
    }
    .form-select, .form-control {
      height: 50px;
      border-radius: 5px;
      border: 1px solid #ddd;
      padding: 10px 15px;
    }
    .form-select:focus, .form-control:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 0 0.25rem rgba(74, 144, 226, 0.25);
    }
    .submit-btn {
      background: #4a90e2;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s;
      width: 100%;
    }
    .submit-btn:hover {
      background: #3a7bc8;
      transform: translateY(-2px);
    }
    .form-label {
      font-weight: 500;
      color: #2c3e50;
      margin-bottom: 8px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .error-message {
      color: #dc3545;
      font-size: 0.875em;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <div class="container booking-container">
    <div class="booking-header">
      <h2>Book Ornament & Costume</h2>
      <p class="text-muted">Fill the form below to make your booking</p>
    </div>

    <form id="form1" name="form1" method="post" action="/user_book_ornament_and_costume_post" onsubmit="return validateForm()">
      {% csrf_token %}

      <div class="form-group">
        <label for="category" class="form-label">Category</label>
        <select name="category" id="category" class="form-select" required>
          <option value="">--Select Category--</option>
          {% for i in res1 %}
            <option value="{{ i.id }}">{{ i.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="ornament" class="form-label">Ornament & Costume</label>
        <select name="ornament" id="ornament" class="form-select" required>
          <option value="">--Select Ornament--</option>
        </select>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="from_day" class="form-label">From Day</label>
            <input type="date" name="from_day" id="from_day" class="form-control" required />
            <div id="from_day_error" class="error-message"></div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label for="to_day" class="form-label">To Day</label>
            <input type="date" name="to_day" id="to_day" class="form-control" required />
            <div id="to_day_error" class="error-message"></div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="quantity" class="form-label">Quantity</label>
            <input type="number" name="Quantity" id="quantity" class="form-control" min="1" value="1" required />
            <div id="quantity_error" class="error-message"></div>
          </div>
        </div>
      </div>

      <div class="form-group mt-4">
        <button type="submit" class="btn btn-primary submit-btn">Book Now</button>
      </div>
    </form>
  </div>

  <script>
    $(document).ready(function(){
      // Set minimum date to today for from date
      var today = new Date().toISOString().split('T')[0];
      $("#from_day").attr('min', today);

      // When from date changes, update to date min value
      $("#from_day").change(function() {
        var fromDate = $(this).val();
        if (fromDate) {
          // Set the minimum to date to the day after from date
          var nextDay = new Date(fromDate);
          nextDay.setDate(nextDay.getDate() + 1);
          var nextDayStr = nextDay.toISOString().split('T')[0];
          $("#to_day").attr('min', nextDayStr);

          // If current to date is before new min date, clear it
          var toDate = $("#to_day").val();
          if (toDate && new Date(toDate) < new Date(nextDayStr)) {
            $("#to_day").val('');
            $("#to_day_error").text("Please select a date after " + formatDate(fromDate));
          }
        }
        validateDates();
      });

      // Validate to date whenever it changes
      $("#to_day").change(function() {
        validateDates();
      });

      // Validate quantity
      $("#quantity").change(function() {
        validateQuantity();
      });

      $("#category").change(function(){
        var categoryId = $(this).val();
        if (categoryId) {
          $.ajax({
            url: "/get_ornaments_by_category/" + categoryId + "/",
            success: function(data){
              $("#ornament").empty();
              $("#ornament").append('<option value="">--Select Ornament--</option>');
              data.forEach(function(item){
                $("#ornament").append('<option value="' + item.id + '">' + item.name + '</option>');
              });
            }
          });
        } else {
          $("#ornament").empty();
          $("#ornament").append('<option value="">--Select Ornament--</option>');
        }
      });
    });

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function validateDates() {
      var fromDate = new Date($("#from_day").val());
      var toDate = new Date($("#to_day").val());
      var today = new Date();
      today.setHours(0, 0, 0, 0);

      var isValid = true;

      // Clear previous errors
      $("#from_day_error, #to_day_error").text("");

      // Validate from date
      if ($("#from_day").val()) {
        if (fromDate < today) {
          $("#from_day_error").text("From date cannot be before today");
          isValid = false;
        }
      }

      // Validate to date
      if ($("#to_day").val()) {
        if (toDate <= fromDate) {
          $("#to_day_error").text("To date must be after " + formatDate($("#from_day").val()));
          isValid = false;
        }
      }

      return isValid;
    }

    function validateQuantity() {
      var quantity = $("#quantity").val();
      var isValid = true;

      $("#quantity_error").text("");

      if (quantity <= 0) {
        $("#quantity_error").text("Quantity must be at least 1");
        isValid = false;
      }

      return isValid;
    }

    function validateForm() {
      var isDatesValid = validateDates();
      var isQuantityValid = validateQuantity();

      return isDatesValid && isQuantityValid;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% endblock %}
