<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Festival Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-image: url('/static/ndesigns/img/hero/bg5.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .registration-container {
            position: relative;
            z-index: 2;
            width: 500px; /* Increased width */
            max-height: 90vh;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px; /* Increased padding */
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        .festival-icon {
            font-size: 70px; /* Larger icon */
            color: #FF6B6B;
            margin-bottom: 25px; /* More space */
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 28px; /* Larger heading */
        }

        .input-group {
            margin-bottom: 25px; /* More space between fields */
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px; /* More space */
            color: #555;
            font-weight: 500;
            font-size: 16px; /* Slightly larger */
        }

        .input-field {
            position: relative;
        }

        .input-field i {
            position: absolute;
            left: 20px; /* More space from left */
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 18px; /* Larger icon */
        }

        .input-field input, .input-field select {
            width: 100%;
            padding: 15px 20px 15px 55px; /* More padding */
            border: 2px solid #ddd;
            border-radius: 10px; /* More rounded */
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-field input:focus, .input-field select:focus {
            border-color: #FF6B6B;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.2);
        }

        .image-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .image-upload label {
            display: block;
            margin-bottom: 10px; /* More space */
            color: #555;
            font-weight: 500;
            width: 100%;
            text-align: left;
            font-size: 16px; /* Slightly larger */
        }

        .image-upload input[type="file"] {
            width: 100%;
            padding: 12px; /* More padding */
            border: 2px dashed #ddd;
            border-radius: 10px; /* More rounded */
            font-size: 15px; /* Slightly larger */
        }

        .image-upload input[type="file"]:focus {
            border-color: #FF6B6B;
            outline: none;
        }

        .btn-register {
            width: 100%;
            padding: 15px; /* More padding */
            background: linear-gradient(45deg, #FF6B6B, #FF8E8E);
            border: none;
            border-radius: 10px; /* More rounded */
            color: white;
            font-size: 18px; /* Larger text */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px; /* More space */
        }

        .btn-register:hover {
            background: linear-gradient(45deg, #FF8E8E, #FF6B6B);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .login-link {
            margin-top: 25px; /* More space */
            color: #555;
            font-size: 16px; /* Slightly larger */
        }

        .login-link a {
            color: #FF6B6B;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) { /* Adjusted breakpoint */
            .registration-container {
                width: 90%;
                padding: 30px 25px; /* Still generous padding */
            }

            .festival-icon {
                font-size: 60px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <div class="festival-icon">
            <i class="fas fa-mask"></i> <!-- Festival mask icon -->
        </div>
        <h2>User Registration</h2>

        <form id="registrationForm" name="registrationForm" method="post" action="/user_register_post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="input-group">
                <label for="username">Username</label>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" name="textfield" id="username" pattern="[A-Za-z ]*" placeholder="Enter your username" required />
                </div>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="textfield2" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.com" id="email" placeholder="Enter your email" required />
                </div>
            </div>

            <div class="input-group">
                <label for="contact">Contact Number</label>
                <div class="input-field">
                    <i class="fas fa-phone"></i>
                    <input type="tel" name="textfield3" pattern="[6-9][0-9]{9}" id="contact" placeholder="Enter your contact number" required />
                </div>
            </div>

            <div class="input-group">
                <label for="place">Place</label>
                <div class="input-field">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" name="textfield4" id="place" placeholder="Enter your place" required />
                </div>
            </div>

            <div class="input-group">
                <label for="landmark">Landmark</label>
                <div class="input-field">
                    <i class="fas fa-landmark"></i>
                    <input type="text" name="textfield5" id="landmark" placeholder="Enter nearby landmark" required />
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" id="password" placeholder="Enter your password" required />
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="ConfirmPassword" id="confirmPassword" placeholder="Confirm your password" required />
                </div>
            </div>

            <div class="image-upload">
                <label for="profileImage">Profile Image</label>
                <input type="file" name="fileField" id="profileImage" accept="image/*" required />
            </div>

            <button type="submit" class="btn-register">Register</button>

            <div class="login-link">
                Already have an account? <a href="/log">Login here</a>
            </div>
        </form>
    </div>

    <script>
        // Password confirmation validation
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match!');
                document.getElementById('confirmPassword').focus();
            }
        });
    </script>
</body>
</html>
