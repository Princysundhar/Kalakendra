


{% extends 'admin/admin_index.html' %}
{% block body %}

<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Edit Tutor Profile</title>
<style>
    :root {
        --primary-color: #3498db;
        --primary-hover: #2980b9;
        --secondary-color: #6c757d;
        --light-gray: #f8f9fa;
        --border-color: #e9ecef;
        --text-color: #495057;
        --shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .form-wrapper {
        max-width: 600px;
        margin: 30px auto;
        padding: 40px;
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        transition: transform 0.3s ease;
        border-top: 4px solid var(--primary-color);
    }

    .form-wrapper:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(52, 152, 219, 0.2);
    }

    .form-title {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 30px;
        font-size: 24px;
        font-weight: 600;
        position: relative;
        padding-bottom: 10px;
    }

    .form-title:after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: var(--primary-color);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th {
        text-align: left;
        padding: 12px 15px;
        color: var(--text-color);
        font-weight: 500;
        font-size: 14px;
        background-color: rgba(52, 152, 219, 0.05);
    }

    td {
        padding: 15px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="file"] {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s;
        box-sizing: border-box;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    input[type="file"]:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        outline: none;
    }

    /* Image Preview Styling */
    .image-preview {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 15px;
    }

    .image-preview img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid var(--border-color);
    }

    /* File Upload Styling */
    .file-upload-wrapper {
        position: relative;
    }

    .file-upload {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 25px;
        background: var(--light-gray);
        border: 2px dashed var(--border-color);
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
    }

    .file-upload:hover {
        border-color: var(--primary-color);
        background: rgba(52, 152, 219, 0.05);
    }

    .file-upload i {
        font-size: 24px;
        color: var(--primary-color);
        margin-bottom: 10px;
    }

    .file-upload-text {
        color: var(--secondary-color);
        font-size: 14px;
    }

    .file-name {
        margin-top: 8px;
        font-size: 12px;
        color: var(--primary-color);
        display: none;
    }

    input[type="file"] {
        display: none;
    }

    input[type="submit"] {
        padding: 14px 25px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        letter-spacing: 0.5px;
        width: auto;
        display: block;
        margin: 20px auto 0;
    }

    input[type="submit"]:hover {
        background: var(--primary-hover);
        box-shadow: 0 4px 8px rgba(41, 128, 185, 0.3);
        transform: translateY(-2px);
    }

    /* Animation */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .form-wrapper {
        animation: fadeIn 0.5s ease-out;
    }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body>
<div class="form-wrapper">
    <div class="form-title">Edit Tutor Profile</div>
    <form action="/admin_edit_tutor_post/{{ tutors.id }}" method="post" enctype="multipart/form-data" name="form1" id="form1">
      <table width="200" border="0">
        <tr>
          <th scope="row">Name</th>
          <td><input type="text" name="textfield" id="textfield" value="{{ tutors.name }}" required /></td>
        </tr>
        <tr>
          <th scope="row">Email</th>
          <td><input type="email" name="textfield2" id="textfield2" value="{{ tutors.email }}" required /></td>
        </tr>
        <tr>
          <th scope="row">Contact</th>
          <td><input type="tel" name="textfield3" id="textfield3" value="{{ tutors.contact }}" required /></td>
        </tr>
        <tr>
          <th scope="row">Image</th>
          <td>
            <div class="image-preview">
                <img src="{{ tutors.image }}" alt="Current Profile Image"/>
                <div class="file-upload-wrapper">
                  <label for="fileField" class="file-upload">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span class="file-upload-text">Change profile image</span>
                    <span class="file-name" id="file-name">No file chosen</span>
                  </label>
                  <input type="file" name="fileField" id="fileField" onchange="displayFileName(this)" />
                </div>
            </div>
          </td>
        </tr>
        <tr>
          <th scope="row">Place</th>
          <td><input type="text" name="textfield4" id="textfield4" value="{{ tutors.place }}" required /></td>
        </tr>
        <tr>
          <th scope="row">Landmark</th>
          <td><input type="text" name="textfield5" id="textfield5" value="{{ tutors.landmark }}" /></td>
        </tr>
        <tr>
          <td colspan="2" style="text-align: center;">
            <input type="submit" name="button" id="button" value="Update" />
          </td>
        </tr>
      </table>
    </form>
</div>

<script>
    function displayFileName(input) {
        const fileNameDisplay = document.getElementById('file-name');
        if (input.files.length > 0) {
            fileNameDisplay.textContent = input.files[0].name;
            fileNameDisplay.style.display = 'block';

            // Preview the new image
            const reader = new FileReader();
            reader.onload = function(e) {
                document.querySelector('.image-preview img').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        } else {
            fileNameDisplay.style.display = 'none';
        }
    }
</script>
</body>
</html>
{% endblock %}
